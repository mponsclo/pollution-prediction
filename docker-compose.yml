services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlartifacts:/mlflow/mlartifacts
    command: >
      mlflow ui
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/mlartifacts
    restart: unless-stopped

  # Note: the Next.js frontend (frontend/) is not in this stack — it runs on
  # Vercel in production and locally via `make frontend`. See frontend/README.md.
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_air_quality_dashboard.py:/app/streamlit_air_quality_dashboard.py
      - ./outputs:/app/outputs
    command: >
      streamlit run streamlit_air_quality_dashboard.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    depends_on:
      - api
    restart: unless-stopped
