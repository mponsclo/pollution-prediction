name: Terraform Apply

# Manual-trigger only: applies Terraform against the live GCP project.
# Run on demand when infrastructure changes need to be rolled out.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_WORKING_DIR: terraform

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production # GitHub Environment with required reviewers
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0

      - name: Decrypt tfvars
        run: sops --decrypt terraform.tfvars.enc > terraform.tfvars

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init
        run: terraform init

      # Re-generate the plan against current state, then apply that exact plan.
      # The `environment: production` gate above already requires a human
      # reviewer to approve the job run before these steps execute.
      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Show plan
        run: terraform show -no-color tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 14

      - name: Terraform apply
        run: terraform apply -input=false tfplan
