name: Lint

on:
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: check

      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
